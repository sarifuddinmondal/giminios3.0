<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini OS - Advanced Player</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: black; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .video-js { width: 100vw; height: 100vh; }

        /* প্লেলিস্ট ড্রয়ার (বাম দিকে থাকবে) */
        #playlist-drawer {
            position: absolute; top: 0; left: -350px;
            width: 320px; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 20; transition: 0.5s;
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
            padding: 20px 10px;
        }

        #playlist-drawer.open { left: 0; }

        .ch-item {
            padding: 12px 15px;
            margin-bottom: 5px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            color: #ccc;
            transition: 0.2s;
        }

        .ch-item:hover, .ch-item:focus {
            background: #3d85c6; color: white; outline: none;
        }

        .player-info {
            position: absolute; top: 30px; left: 40px;
            z-index: 10; color: white;
            background: rgba(0,0,0,0.6);
            padding: 15px 30px; border-radius: 20px;
            backdrop-filter: blur(15px);
            opacity: 0; transition: 0.8s; pointer-events: none;
        }

        .show-ui .player-info, .show-ui .back-btn, .show-ui #list-toggle { opacity: 1; }

        .back-btn, #list-toggle {
            position: absolute; top: 30px; z-index: 21;
            background: rgba(255,255,255,0.1);
            color: white; border: 2px solid rgba(255,255,255,0.2); 
            padding: 12px 25px; border-radius: 50px; 
            cursor: pointer; font-weight: bold; opacity: 0; transition: 0.5s;
        }

        .back-btn { right: 40px; }
        #list-toggle { left: 40px; }

        .loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: black; z-index: 100; display: flex;
            align-items: center; justify-content: center; color: #3d85c6;
        }
    </style>
</head>
<body class="show-ui">

    <div id="loader" class="loading-overlay">Parsing Playlist... Please Wait</div>

    <button id="list-toggle" onclick="togglePlaylist()">☰ Channel List</button>
    <button class="back-btn" id="closeBtn" onclick="goBack()">✕ Close</button>

    <div id="playlist-drawer">
        <h3 style="color: #3d85c6; margin-left: 10px;">Channels</h3>
        <div id="channel-container"></div>
    </div>

    <div class="player-info">
        <div id="ch-name" style="font-size: 24px; font-weight: bold;">Loading...</div>
        <div id="user-tag" style="font-size: 12px; opacity: 0.6;">Syncing...</div>
    </div>

    <video id="gemini-live-player" class="video-js vjs-big-play-centered" controls autoplay preload="auto"></video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const sourceUrl = params.get('url');
        const player = videojs('gemini-live-player');

        async function init() {
            if (!sourceUrl) return goBack();

            // যদি এটি একটি M3U প্লেলিস্ট হয়
            if (sourceUrl.endsWith('.m3u') || sourceUrl.includes('m3u')) {
                await parseM3U(sourceUrl);
                document.getElementById('loader').style.display = 'none';
                togglePlaylist(); // প্লেলিস্টটি অটো ওপেন হবে
            } else {
                playStream(sourceUrl, params.get('name') || "Live TV");
                document.getElementById('loader').style.display = 'none';
            }
        }

        // M3U Parser: লিঙ্ক থেকে চ্যানেলের নাম এবং ইউআরএল বের করবে
        async function parseM3U(url) {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const lines = text.split('\n');
                const container = document.getElementById('channel-container');
                
                let currentName = "";

                lines.forEach(line => {
                    if (line.startsWith('#EXTINF:')) {
                        currentName = line.split(',')[1] || "Unnamed Channel";
                    } else if (line.startsWith('http')) {
                        const channelUrl = line.trim();
                        const btn = document.createElement('div');
                        btn.className = 'ch-item';
                        btn.innerText = currentName;
                        btn.tabIndex = 0;
                        btn.onclick = () => {
                            playStream(channelUrl, btn.innerText);
                            togglePlaylist();
                        };
                        container.appendChild(btn);
                    }
                });
            } catch (e) {
                alert("Could not load playlist. Check internet or URL.");
                goBack();
            }
        }

        function playStream(url, name) {
            document.getElementById('ch-name').innerText = name;
            player.src({
                src: url,
                type: (url.includes('m3u8')) ? 'application/x-mpegURL' : 'video/mp4'
            });
            player.play();
        }

        function togglePlaylist() {
            document.getElementById('playlist-drawer').classList.toggle('open');
        }

        function goBack() { window.location.href = 'giminios.html'; }

        // রিমোট কন্ট্রোল সাপোর্ট
        document.addEventListener('keydown', (e) => {
            if (e.key === 'm' || e.key === 'Menu') togglePlaylist();
            if (e.key === 'Backspace') goBack();
        });

        init();
    </script>
</body>
</html>
