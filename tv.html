<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini OS - Advanced Player</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: black; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .video-js { width: 100vw; height: 100vh; }

        /* প্লেলিস্ট ড্রয়ার */
        #playlist-drawer {
            position: absolute; top: 0; left: -350px;
            width: 300px; height: 100%;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(20px);
            z-index: 20; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
            padding: 20px 15px;
        }

        #playlist-drawer.open { left: 0; }

        .ch-item {
            padding: 15px; margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px; cursor: pointer;
            font-size: 14px; color: #eee;
            border: 1px solid transparent;
        }

        .ch-item:hover, .ch-item:focus {
            background: #3d85c6; border-color: white; outline: none;
        }

        /* UI Elements */
        .player-info {
            position: absolute; top: 30px; left: 40px;
            z-index: 10; color: white; background: rgba(0,0,0,0.7);
            padding: 15px 25px; border-radius: 15px;
            opacity: 0; transition: 0.5s;
        }

        .show-ui .player-info, .show-ui .back-btn, .show-ui #list-toggle { opacity: 1; }

        .back-btn, #list-toggle {
            position: absolute; top: 30px; z-index: 21;
            background: rgba(255,255,255,0.1); color: white;
            border: 1px solid rgba(255,255,255,0.2); 
            padding: 12px 20px; border-radius: 50px; 
            cursor: pointer; opacity: 0; transition: 0.5s;
        }

        .back-btn { right: 40px; }
        #list-toggle { left: 40px; }

        .loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; z-index: 100; display: flex;
            flex-direction: column; align-items: center; justify-content: center; color: #3d85c6;
        }
    </style>
</head>
<body class="show-ui">

    <div id="loader" class="loading-overlay">
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">Gemini Stream</div>
        <div id="status">Syncing Playlist...</div>
    </div>

    <button id="list-toggle" onclick="togglePlaylist()">☰ Channels</button>
    <button class="back-btn" onclick="goBack()">✕ Close</button>

    <div id="playlist-drawer">
        <h2 style="color: #3d85c6; margin-bottom: 20px;">India Live TV</h2>
        <div id="channel-container"></div>
    </div>

    <div class="player-info">
        <div id="ch-name" style="font-size: 20px; font-weight: bold;">Loading Stream...</div>
        <div id="user-tag" style="font-size: 12px; opacity: 0.6; margin-top: 5px;">Remote Connected</div>
    </div>

    <video id="gemini-live-player" class="video-js vjs-big-play-centered" controls autoplay preload="auto"></video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const sourceUrl = params.get('url');
        const player = videojs('gemini-live-player');
        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        // ১. শুরু করার ফাংশন
        async function init() {
            if (!sourceUrl) return goBack();

            if (sourceUrl.includes('m3u')) {
                await parseM3U(sourceUrl);
                document.getElementById('loader').style.display = 'none';
            } else {
                playStream(sourceUrl, params.get('name') || "Live TV");
                document.getElementById('loader').style.display = 'none';
            }
            
            setupRemoteListener();
        }

        // ২. M3U Parser (CORS Proxy ব্যবহার করে)
        async function parseM3U(url) {
            try {
                // CORS সমস্যার সমাধানের জন্য প্রক্সি ব্যবহার
                const proxy = "https://api.allorigins.win/raw?url=";
                const response = await fetch(proxy + encodeURIComponent(url));
                const text = await response.text();
                
                const lines = text.split('\n');
                const container = document.getElementById('channel-container');
                let currentName = "";

                lines.forEach(line => {
                    line = line.trim();
                    if (line.startsWith('#EXTINF:')) {
                        currentName = line.split(',')[1] || "Unknown Channel";
                    } else if (line.startsWith('http')) {
                        const channelUrl = line;
                        const btn = document.createElement('div');
                        btn.className = 'ch-item';
                        btn.innerText = currentName;
                        btn.onclick = () => {
                            playStream(channelUrl, btn.innerText);
                            togglePlaylist();
                        };
                        container.appendChild(btn);
                    }
                });
            } catch (e) {
                document.getElementById('status').innerText = "Error: Failed to fetch playlist.";
                console.error(e);
            }
        }

        function playStream(url, name) {
            document.getElementById('ch-name').innerText = name;
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            player.play().catch(e => console.log("Auto-play blocked or failed."));
        }

        function togglePlaylist() {
            document.getElementById('playlist-drawer').classList.toggle('open');
        }

        function goBack() { window.location.href = 'giminios.html'; }

        // ৩. রিমোট কমান্ড লিসেনার (Supabase)
        function setupRemoteListener() {
            supabaseClient
                .channel('remote-control')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'remote_commands' }, payload => {
                    const cmd = payload.new.command;
                    handleRemote(cmd);
                })
                .subscribe();
        }

        function handleRemote(cmd) {
            if (cmd === 'back') goBack();
            if (cmd === 'ok') {
                if (document.getElementById('playlist-drawer').classList.contains('open')) {
                    document.activeElement.click();
                } else {
                    player.paused() ? player.play() : player.pause();
                }
            }
            if (cmd === 'up') /* Focus Logic Here */;
            if (cmd === 'vol_up') player.volume(player.volume() + 0.1);
            if (cmd === 'vol_down') player.volume(player.volume() - 0.1);
        }

        init();
    </script>
</body>
</html>
