<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini OS 3.0 - Login</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="config.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        #boot-screen { text-align: center; }
        .company-logo { width: 120px; animation: zoomFade 2.5s infinite; }
        .os-name { font-size: 40px; letter-spacing: 8px; font-weight: 300; margin-top: 10px; }

        #login-section, #qr-section { display: none; width: 100%; max-width: 400px; padding: 30px; text-align: center; }
        .container-box { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 40px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }

        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 18px; }
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #fff; color: #000; font-weight: bold; cursor: pointer; }
        
        #qrcode { background: #fff; padding: 15px; border-radius: 15px; display: inline-block; margin: 20px 0; }
        
        @keyframes zoomFade { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }
    </style>
</head>
<body>

    <div id="boot-screen">
        <img src="https://img.icons8.com/fluency/144/layers.png" class="company-logo">
        <h1 class="os-name">GEMINI OS</h1>
    </div>

    <div id="login-section">
        <div class="container-box">
            <h2>WELCOME</h2>
            <p style="opacity:0.6">Enter mobile to link Remote</p>
            <input type="tel" id="mobileInput" placeholder="017XXXXXXXX" maxlength="11">
            <button class="btn-main" onclick="doLogin()">PROCEED</button>
        </div>
    </div>

    <div id="qr-section">
        <div class="container-box">
            <h3>SCAN TO LINK</h3>
            <div id="qrcode"></div>
            <button class="btn-main" onclick="finishLogin()">START ENGINE</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            // ৫ সেকেন্ড পর বুট স্ক্রিন সরিয়ে লগইন দেখাবে
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = "none";
                document.getElementById('login-section').style.display = "block";
            }, 5000);
        };

        async function doLogin() {
            const mobile = document.getElementById('mobileInput').value;
            if (mobile.length < 10) return alert("Valid number please!");

            localStorage.setItem("user_mobile", mobile);

            // QR Code জেনারেট করা
            const remoteUrl = `https://sarifuddinmondal.github.io/giminios3.0/remote.html?user=${mobile}`;
            document.getElementById('qrcode').innerHTML = ""; // আগের QR মুছতে
            new QRCode(document.getElementById("qrcode"), { text: remoteUrl, width: 180, height: 180 });

            document.getElementById('login-section').style.display = "none";
            document.getElementById('qr-section').style.display = "block";
        }

        function finishLogin() {
            localStorage.setItem("gemini_active", "true");
            window.location.href = "giminios.html";
        }
    </script>
</body>
</html>
