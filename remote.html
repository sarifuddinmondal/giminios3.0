<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini OS - Smart Remote</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --remote-bg: #2d2d2d;
            --accent-blue: #3d85c6;
            --danger-red: #ff3b30;
            --btn-gray: #444;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        .remote-container {
            background: var(--remote-bg);
            width: 280px;
            height: 600px;
            border-radius: 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 10px;
            border: 2px solid #333;
        }

        .brand {
            font-size: 12px;
            letter-spacing: 4px;
            opacity: 0.5;
            margin-bottom: 20px;
        }

        /* পাওয়ার বাটন */
        .power-btn {
            width: 50px;
            height: 50px;
            background: var(--danger-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: none;
            cursor: pointer;
            margin-bottom: 30px;
        }

        /* নেভিগেশন প্যাড (D-Pad) */
        .dpad {
            position: relative;
            width: 180px;
            height: 180px;
            background: #222;
            border-radius: 50%;
            display: grid;
            grid-template-areas: 
                ". up ."
                "left ok right"
                ". down .";
            align-items: center;
            justify-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .d-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            transition: 0.1s;
        }

        .d-btn:active { color: var(--accent-blue); transform: scale(0.9); }

        .ok-btn {
            grid-area: ok;
            width: 70px;
            height: 70px;
            background: var(--accent-blue);
            border-radius: 50%;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        /* কন্ট্রোল বাটন রো */
        .btn-row {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .ctrl-btn {
            width: 60px;
            height: 60px;
            background: var(--btn-gray);
            border-radius: 15px;
            border: none;
            color: white;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #222;
            cursor: pointer;
        }

        .ctrl-btn:active { transform: translateY(3px); box-shadow: none; }

        .vol-ch-container {
            display: flex;
            gap: 40px;
            margin-top: 30px;
        }

        .vertical-ctrl {
            display: flex;
            flex-direction: column;
            background: #222;
            border-radius: 30px;
            padding: 10px;
            gap: 15px;
        }

        .v-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            padding: 10px;
            cursor: pointer;
        }

        .v-label { font-size: 10px; opacity: 0.5; text-align: center; }

        .voice-btn {
            margin-top: auto;
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #3d85c6, #2980b9);
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="remote-container">
        <div class="brand">GEMINI OS 3.0</div>
        
        <button class="power-btn" onclick="sendCommand('power')">⏻</button>

        <div class="dpad">
            <button class="d-btn" style="grid-area: up;" onclick="sendCommand('up')">▲</button>
            <button class="d-btn" style="grid-area: left;" onclick="sendCommand('left')">◀</button>
            <button class="ok-btn" onclick="sendCommand('ok')">OK</button>
            <button class="d-btn" style="grid-area: right;" onclick="sendCommand('right')">▶</button>
            <button class="d-btn" style="grid-area: down;" onclick="sendCommand('down')">▼</button>
        </div>

        <div class="btn-row">
            <button class="ctrl-btn" onclick="sendCommand('back')">↩<br>BACK</button>
            <button class="ctrl-btn" onclick="sendCommand('home')">🏠<br>HOME</button>
            <button class="ctrl-btn" onclick="sendCommand('play_pause')">⏯<br>P/P</button>
        </div>

        <div class="vol-ch-container">
            <div class="vertical-ctrl">
                <button class="v-btn" onclick="sendCommand('vol_up')">+</button>
                <div class="v-label">VOL</div>
                <button class="v-btn" onclick="sendCommand('vol_down')">-</button>
            </div>
            <div class="vertical-ctrl">
                <button class="v-btn" onclick="sendCommand('next_video')">∧</button>
                <div class="v-label">CH</div>
                <button class="v-btn" onclick="sendCommand('back')">∨</button>
            </div>
        </div>

        <button class="voice-btn" onclick="startVoiceSearch()">🎤</button>
    </div>

    <script>
        function sendCommand(action) {
            // হ্যাপটিক ভাইব্রেশন (মোবাইলের জন্য)
            if (navigator.vibrate) navigator.vibrate(40);

            // পাইথন সার্ভারে রিকোয়েস্ট পাঠানো
            fetch(`/api/${action}`)
                .then(res => console.log('Action Sent:', action))
                .catch(err => console.error('Connection Lost'));
        }

        function startVoiceSearch() {
            const query = prompt("What do you want to search?");
            if (query) {
                fetch(`/search?q=${encodeURIComponent(query)}`);
            }
        }
    </script>
</body>
</html>
