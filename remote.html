<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Remote - Mobile</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        :root {
            --bg-dark: #0f0f0f;
            --panel-bg: #1e1e1e;
            --accent-blue: #3d85c6;
            --danger-red: #ff3b30;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none; /* জুম বন্ধ রাখার জন্য */
        }

        .remote-app {
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .brand-logo {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--accent-blue);
        }

        /* পাওয়ার বাটন */
        .power-btn {
            width: 55px;
            height: 55px;
            background: var(--danger-red);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 22px;
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* নেভিগেশন কন্ট্রোল */
        .dpad-outer {
            width: 260px;
            height: 260px;
            background: #252525;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin: 20px 0;
        }

        .dpad-btn {
            position: absolute;
            background: none;
            border: none;
            color: #888;
            font-size: 30px;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dpad-btn:active { color: var(--accent-blue); }

        .up    { top: 5px; }
        .down  { bottom: 5px; }
        .left  { left: 5px; }
        .right { right: 5px; }

        .ok-btn {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 50%;
            border: 2px solid #333;
            color: white;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            z-index: 2;
        }
        .ok-btn:active { background: var(--accent-blue); border-color: var(--accent-blue); }

        /* সেকেন্ডারি বাটন রো */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            margin-top: 20px;
        }

        .btn-round {
            background: var(--panel-bg);
            border: 1px solid #333;
            border-radius: 20px;
            height: 70px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 12px;
        }

        .btn-round i { font-size: 20px; }
        .btn-round:active { background: #333; transform: scale(0.95); }

        /* ভলিউম ও চ্যানেল কন্ট্রোল */
        .sliders-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 30px;
            gap: 20px;
        }

        .vert-pill {
            background: var(--panel-bg);
            width: 75px;
            height: 160px;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border: 1px solid #333;
        }

        .pill-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            width: 100%;
            height: 50px;
        }

        .pill-label {
            font-size: 12px;
            font-weight: bold;
            color: #555;
        }

        /* বটম বার */
        .bottom-nav {
            margin-top: auto;
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 20px;
        }

        .mic-btn {
            width: 70px;
            height: 70px;
            background: var(--accent-blue);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 28px;
            box-shadow: 0 10px 20px rgba(61, 133, 198, 0.4);
        }
    </style>
</head>
<body>

    <div class="remote-app">
        <div class="header">
            <div class="brand-logo">GEMINI OS 3.0</div>
            <button class="power-btn" onclick="sendCmd('power')">⏻</button>
        </div>

        <div class="dpad-outer">
            <button class="dpad-btn up" onclick="sendCmd('up')">▲</button>
            <button class="dpad-btn left" onclick="sendCmd('left')">◀</button>
            <button class="ok-btn" onclick="sendCmd('ok')">OK</button>
            <button class="dpad-btn right" onclick="sendCmd('right')">▶</button>
            <button class="dpad-btn down" onclick="sendCmd('down')">▼</button>
        </div>

        <div class="controls-grid">
            <button class="btn-round" onclick="sendCmd('back')"><span>↩</span> BACK</button>
            <button class="btn-round" onclick="sendCmd('home')"><span>🏠</span> HOME</button>
            <button class="btn-round" onclick="sendCmd('play_pause')"><span>⏯</span> P/P</button>
        </div>

        <div class="sliders-row">
            <div class="vert-pill">
                <button class="pill-btn" onclick="sendCmd('vol_up')">+</button>
                <div class="pill-label">VOL</div>
                <button class="pill-btn" onclick="sendCmd('vol_down')">−</button>
            </div>
            <div class="vert-pill">
                <button class="pill-btn" onclick="sendCmd('next_ch')">∧</button>
                <div class="pill-label">CH</div>
                <button class="pill-btn" onclick="sendCmd('prev_ch')">∨</button>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="mic-btn" onclick="startVoice()">🎤</button>
        </div>
    </div>

    <script>
        // হ্যাপটিক ফিডব্যাক (মোবাইলে ভাইব্রেশন)
        function vibrate() {
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function sendCmd(action) {
            vibrate();
            console.log("Command Sent:", action);

            // সুপাবেস বা এপিআই এর মাধ্যমে টিভিতে সিগন্যাল পাঠানো
            // উদাহরণ: fetch(`/api/remote?command=${action}`);
            
            // আপনার বর্তমান সিস্টেম অনুযায়ী এখানে fetch কল করুন
            fetch(`https://your-api-url.com/remote?cmd=${action}`).catch(e => {
                // অফলাইন মোডে বা লোকাললি এরর হ্যান্ডেল করুন
            });
        }

        function startVoice() {
            vibrate();
            const q = prompt("কী খুঁজতে চান?");
            if(q) sendCmd('search&q=' + encodeURIComponent(q));
        }
    </script>
</body>
</html>
