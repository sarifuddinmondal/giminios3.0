<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Remote PRO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        :root {
            --bg: #0f0f0f;
            --panel: #1e1e1e;
            --accent: #3d85c6;
            --red: #ff3b30;
            --yt: #ff0000;
            --live: #4caf50;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow-y: auto; /* নম্বর প্যাড যুক্ত হওয়ায় স্ক্রল এনাবল করা হয়েছে */
            touch-action: manipulation;
        }

        .remote-app {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(180deg, #1a1a1a 0%, #050505 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .power-btn {
            width: 50px; height: 50px;
            background: var(--red);
            border-radius: 50%; border: none;
            color: white; font-size: 20px;
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.4);
        }

        /* নম্বর প্যাড স্টাইল */
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 20px;
        }

        .num-btn {
            width: 60px; height: 45px;
            background: var(--panel);
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }
        .num-btn:active { background: var(--accent); }

        /* অ্যাপ বাটন */
        .app-shortcuts {
            display: flex; gap: 10px; margin-bottom: 20px;
        }
        .app-btn {
            padding: 8px 15px; border-radius: 10px;
            border: none; color: white; font-weight: bold; font-size: 11px;
        }

        /* নেভিগেশন (D-Pad) */
        .dpad-outer {
            width: 220px; height: 220px;
            background: #222; border-radius: 50%;
            position: relative; display: flex;
            align-items: center; justify-content: center;
            border: 4px solid #2a2a2a; margin: 10px 0;
        }
        .dpad-btn {
            position: absolute; background: none;
            border: none; color: #aaa; font-size: 30px;
        }
        .up { top: 5px; } .down { bottom: 5px; } .left { left: 5px; } .right { right: 5px; }
        .ok-btn {
            width: 80px; height: 80px;
            background: #111; border-radius: 50%;
            border: 2px solid #444; color: white; font-weight: bold;
        }

        /* একশন গ্রিড */
        .grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 12px; width: 100%; margin-top: 20px;
        }
        .btn-action {
            background: var(--panel); border: 1px solid #333;
            border-radius: 12px; height: 50px; color: white; font-size: 12px;
        }

        /* ভলিউম ও চ্যানেল */
        .pill-row {
            display: flex; gap: 30px; margin-top: 20px;
        }
        .pill {
            background: var(--panel); width: 65px; height: 120px;
            border-radius: 30px; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            padding: 8px 0; border: 1px solid #333;
        }
        .pill-b { background: none; border: none; color: white; font-size: 20px; }

        .mic-btn {
            margin: 20px 0; width: 60px; height: 60px;
            background: var(--accent); border-radius: 50%;
            border: none; color: white; font-size: 24px;
            box-shadow: 0 0 15px rgba(61, 133, 198, 0.5);
        }
    </style>
</head>
<body>

    <div class="remote-app">
        <div class="header">
            <span style="color: var(--accent); font-weight: bold; font-size: 12px;">GEMINI OS 3.0</span>
            <button class="power-btn" onclick="send('power')">⏻</button>
        </div>

        <div class="numpad">
            <button class="num-btn" onclick="send('1')">1</button>
            <button class="num-btn" onclick="send('2')">2</button>
            <button class="num-btn" onclick="send('3')">3</button>
            <button class="num-btn" onclick="send('4')">4</button>
            <button class="num-btn" onclick="send('5')">5</button>
            <button class="num-btn" onclick="send('6')">6</button>
            <button class="num-btn" onclick="send('7')">7</button>
            <button class="num-btn" onclick="send('8')">8</button>
            <button class="num-btn" onclick="send('9')">9</button>
            <div style="width:60px"></div>
            <button class="num-btn" onclick="send('0')">0</button>
            <div style="width:60px"></div>
        </div>

        <div class="app-shortcuts">
            <button class="app-btn" style="background: var(--yt)" onclick="send('launch_yt')">YouTube</button>
            <button class="app-btn" style="background: var(--live)" onclick="send('launch_live')">Live TV</button>
            <button class="app-btn" style="background: #444" onclick="send('home')">Dashboard</button>
        </div>

        <div class="dpad-outer">
            <button class="dpad-btn up" onclick="send('up')">▲</button>
            <button class="dpad-btn left" onclick="send('left')">◀</button>
            <button class="ok-btn" onclick="send('ok')">OK</button>
            <button class="dpad-btn right" onclick="send('right')">▶</button>
            <button class="dpad-btn down" onclick="send('down')">▼</button>
        </div>

        <div class="grid">
            <button class="btn-action" onclick="send('back')">BACK</button>
            <button class="btn-action" onclick="send('home')">HOME</button>
            <button class="btn-action" onclick="send('play_pause')">P/P</button>
        </div>

        <div class="pill-row">
            <div class="pill">
                <button class="pill-b" onclick="send('vol_up')">+</button>
                <span style="font-size: 9px; color: #666;">VOL</span>
                <button class="pill-b" onclick="send('vol_down')">−</button>
            </div>
            <div class="pill">
                <button class="pill-b" onclick="send('ch_up')">∧</button>
                <span style="font-size: 9px; color: #666;">CH</span>
                <button class="pill-b" onclick="send('ch_down')">∨</button>
            </div>
        </div>

        <button class="mic-btn" onclick="startVoice()">🎤</button>
    </div>

    <script>
        // আপনার config.js থেকে ডেটা নিয়ে ইনিশিয়ালাইজ করুন
        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        async function send(cmd) {
            // ভাইব্রেশন ফিডব্যাক
            if (navigator.vibrate) navigator.vibrate(40);
            
            console.log("Sending Command:", cmd);

            // সুপাবেস ডাটাবেসে কমান্ড পাঠানো
            const { error } = await supabaseClient
                .from('remote_commands')
                .insert([{ command: cmd, created_at: new Date() }]);
            
            if (error) {
                console.error("Supabase Error:", error.message);
                alert("Connection Error!");
            }
        }

        function startVoice() {
            if (navigator.vibrate) navigator.vibrate(80);
            const q = prompt("What to search on TV?");
            if(q) send('search:' + q);
        }
    </script>
</body>
</html>
