<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Remote PRO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #1a1a1a;
            --accent: #3d85c6;
            --red: #ff3b30;
            --yt: #ff0000;
            --live: #4caf50;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* আইকন হোম স্ক্রিন */
        #home-launch {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }

        .main-icon {
            width: 120px;
            height: 120px;
            background: var(--accent);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(61, 133, 198, 0.3);
            cursor: pointer;
            transition: 0.3s;
            animation: pulse 2s infinite;
        }
        .main-icon img { width: 70px; filter: brightness(0) invert(1); }

        /* রিমোট অ্যাপ মেইন ইন্টারফেস */
        .remote-app {
            display: none; /* শুরুতে লুকানো */
            width: 100%;
            max-width: 400px;
            background: linear-gradient(180deg, #161616 0%, #000000 100%);
            flex-direction: column;
            align-items: center;
            padding: 25px 20px;
            box-sizing: border-box;
        }

        /* --- বাকি সব স্টাইল (আপনার আগের কোড অনুযায়ী) --- */
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .brand { font-size: 14px; font-weight: 900; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
        .user-tag { font-size: 10px; color: #555; background: #222; padding: 4px 10px; border-radius: 10px; }
        .power-btn { width: 55px; height: 55px; background: var(--red); border-radius: 50%; border: none; color: white; font-size: 24px; box-shadow: 0 0 20px rgba(255, 59, 48, 0.4); }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .num-btn { width: 65px; height: 50px; background: var(--panel); border: 1px solid #333; border-radius: 12px; color: white; font-size: 20px; font-weight: bold; }
        .app-shortcuts { display: flex; gap: 10px; margin-bottom: 25px; width: 100%; }
        .app-btn { flex: 1; padding: 12px 5px; border-radius: 12px; border: none; color: white; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .dpad-outer { width: 240px; height: 240px; background: #1e1e1e; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; border: 6px solid #2a2a2a; margin: 15px 0; }
        .dpad-btn { position: absolute; background: none; border: none; color: #888; font-size: 35px; cursor: pointer; padding: 10px; }
        .up { top: 5px; } .down { bottom: 5px; } .left { left: 5px; } .right { right: 5px; }
        .ok-btn { width: 90px; height: 90px; background: linear-gradient(145deg, #222, #111); border-radius: 50%; border: 2px solid #444; color: white; font-weight: bold; font-size: 18px; }
        .pill-row { display: flex; gap: 40px; margin-top: 30px; }
        .pill { background: var(--panel); width: 70px; height: 140px; border-radius: 35px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 12px 0; border: 1px solid #333; }
        .pill-b { background: none; border: none; color: white; font-size: 24px; width: 100%; cursor: pointer; }
        .mic-btn { margin: 30px 0; width: 75px; height: 75px; background: var(--accent); border-radius: 50%; border: none; color: white; font-size: 30px; box-shadow: 0 10px 20px rgba(61, 133, 198, 0.4); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="home-launch" onclick="launchRemote()">
        <div class="main-icon">
            <img src="https://img.icons8.com/fluency/144/layers.png" alt="Logo">
        </div>
        <p style="margin-top: 20px; font-weight: 300; letter-spacing: 2px; color: #555;">TAP TO CONNECT</p>
    </div>

    <div class="remote-app" id="remoteInterface">
        <div class="header">
            <div>
                <span class="brand">Gemini OS</span><br>
                <span id="userDisplay" class="user-tag">Syncing...</span>
            </div>
            <button class="power-btn" onclick="send('power')">⏻</button>
        </div>

        <div class="numpad">
            <button class="num-btn" onclick="send('1')">1</button>
            <button class="num-btn" onclick="send('2')">2</button>
            <button class="num-btn" onclick="send('3')">3</button>
            <button class="num-btn" onclick="send('4')">4</button>
            <button class="num-btn" onclick="send('5')">5</button>
            <button class="num-btn" onclick="send('6')">6</button>
            <button class="num-btn" onclick="send('7')">7</button>
            <button class="num-btn" onclick="send('8')">8</button>
            <button class="num-btn" onclick="send('9')">9</button>
            <div style="width:65px"></div>
            <button class="num-btn" onclick="send('0')">0</button>
        </div>

        <div class="app-shortcuts">
            <button class="app-btn" style="background: var(--yt)" onclick="send('launch_yt')">YouTube</button>
            <button class="app-btn" style="background: var(--live)" onclick="send('launch_live')">Live TV</button>
            <button class="app-btn" style="background: #333" onclick="send('home')">Home</button>
        </div>

        <div class="dpad-outer">
            <button class="dpad-btn up" onclick="send('up')">▲</button>
            <button class="dpad-btn left" onclick="send('left')">◀</button>
            <button class="ok-btn" onclick="send('ok')">OK</button>
            <button class="dpad-btn right" onclick="send('right')">▶</button>
            <button class="dpad-btn down" onclick="send('down')">▼</button>
        </div>

        <div class="pill-row">
            <div class="pill">
                <button class="pill-b" onclick="send('vol_up')">+</button>
                <span style="font-size: 10px; color: #777;">VOL</span>
                <button class="pill-b" onclick="send('vol_down')">−</button>
            </div>
            <div class="pill">
                <button class="pill-b" onclick="send('ch_up')">∧</button>
                <span style="font-size: 10px; color: #777;">CH</span>
                <button class="pill-b" onclick="send('ch_down')">∨</button>
            </div>
        </div>

        <button class="mic-btn" onclick="startVoice()">🎤</button>
    </div>

    <script>
        // ইউআরএল থেকে ইউজার আইডি (মোবাইল নম্বর) সংগ্রহ
        const urlParams = new URLSearchParams(window.location.search);
        const userMobile = urlParams.get('user');

        // সুপাবেস ইনিশিয়ালাইজেশন
        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        function launchRemote() {
            if(!userMobile) {
                alert("Unauthorized Access! Please scan QR again.");
                return;
            }
            // ভাইব্রেশন ফিডব্যাক
            if (navigator.vibrate) navigator.vibrate(100);
            
            document.getElementById('home-launch').style.display = 'none';
            document.getElementById('remoteInterface').style.display = 'flex';
            document.getElementById('userDisplay').innerText = "ID: " + userMobile;
        }

        async function send(cmd) {
            if (navigator.vibrate) navigator.vibrate(45);

            // কমান্ডের সাথে user_id যোগ করে সুপাবেসে পাঠানো হচ্ছে
            const { error } = await supabaseClient
                .from('remote_commands')
                .insert([{ 
                    command: cmd, 
                    user_id: userMobile, // এটি এখন ইউনিক আইডি হিসেবে কাজ করবে
                    created_at: new Date().toISOString() 
                }]);

            if (error) console.error("Error:", error.message);
        }

        function startVoice() {
            const q = prompt("Voice Search:");
            if(q) send('search:' + q);
        }

        // কন্টেক্সট মেনু বন্ধ রাখা
        window.oncontextmenu = (e) => e.preventDefault();
    </script>
</body>
</html>
