<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Stream - Live TV</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        .video-js { width: 100vw; height: 100vh; }
        
        #playlist-drawer {
            position: absolute; top: 0; left: -350px; width: 300px; height: 100%;
            background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px);
            z-index: 20; transition: 0.4s; padding: 20px; overflow-y: auto;
        }
        #playlist-drawer.open { left: 0; }
        .ch-item { padding: 15px; margin-bottom: 8px; background: rgba(255,255,255,0.05); border-radius: 12px; cursor: pointer; color: #eee; }
        .ch-item:hover { background: #3d85c6; }

        .player-info { position: absolute; top: 30px; left: 40px; z-index: 10; color: white; background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 15px; }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #3d85c6; }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">
        <h2>Gemini Stream</h2>
        <div id="status">Syncing Playlist...</div>
    </div>

    <button style="position:absolute; top:30px; left:40px; z-index:21; padding:10px;" onclick="togglePlaylist()">☰ Channels</button>
    <button style="position:absolute; top:30px; right:40px; z-index:21; padding:10px;" onclick="goBack()">✕ Close</button>

    <div id="playlist-drawer">
        <h2 style="color:#3d85c6;">Live TV</h2>
        <div id="channel-container"></div>
    </div>

    <div class="player-info">
        <div id="ch-name">Connecting...</div>
    </div>

    <video id="gemini-live-player" class="video-js vjs-big-play-centered" controls autoplay></video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const sourceUrl = params.get('url');
        const player = videojs('gemini-live-player');
        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        async function init() {
            if (!sourceUrl) return goBack();
            await parseM3U(sourceUrl);
            setupRemoteListener();
        }

        async function parseM3U(url) {
            try {
                const proxy = "https://api.allorigins.win/raw?url=";
                const response = await fetch(proxy + encodeURIComponent(url));
                const text = await response.text();
                const lines = text.split('\n');
                const container = document.getElementById('channel-container');
                
                let currentName = "";
                lines.forEach(line => {
                    if (line.startsWith('#EXTINF:')) currentName = line.split(',')[1];
                    else if (line.startsWith('http')) {
                        const channelUrl = line;
                        const btn = document.createElement('div');
                        btn.className = 'ch-item';
                        btn.innerText = currentName;
                        btn.onclick = () => { playStream(channelUrl, currentName); togglePlaylist(); };
                        container.appendChild(btn);
                    }
                });
                document.getElementById('loader').style.display = 'none';
            } catch (e) { document.getElementById('status').innerText = "Load Failed"; }
        }

        function playStream(url, name) {
            document.getElementById('ch-name').innerText = name;
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
        }

        function togglePlaylist() { document.getElementById('playlist-drawer').classList.toggle('open'); }
        function goBack() { window.location.href = 'giminios.html'; }

        function setupRemoteListener() {
            const mobile = localStorage.getItem("user_mobile");
            supabaseClient
                .channel('remote-control')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'remote_commands' }, payload => {
                    if (payload.new.user_id === mobile) handleRemote(payload.new.command);
                })
                .subscribe();
        }

        function handleRemote(cmd) {
            if (cmd === 'back') goBack();
            if (cmd === 'vol_up') player.volume(player.volume() + 0.1);
            if (cmd === 'vol_down') player.volume(player.volume() - 0.1);
        }

        init();
    </script>
</body>
</html>
