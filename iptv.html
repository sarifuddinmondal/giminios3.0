<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Stream - Live TV</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        .video-js { width: 100vw; height: 100vh; }
        
        /* Playlist Drawer */
        #playlist-drawer {
            position: absolute; top: 0; left: -350px; width: 300px; height: 100%;
            background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px);
            z-index: 20; transition: 0.4s; padding: 20px; overflow-y: auto; border-right: 1px solid #333;
        }
        #playlist-drawer.open { left: 0; }
        .ch-item { padding: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer; border: 1px solid transparent; }
        .ch-item:hover { background: #3d85c6; border-color: white; }

        /* Loader */
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">
        <h2>Gemini Stream</h2>
        <div id="status">Syncing Playlist...</div>
    </div>

    <button style="position:absolute; top:20px; left:20px; z-index:25; padding:10px;" onclick="document.getElementById('playlist-drawer').classList.toggle('open')">☰ Channels</button>
    <button style="position:absolute; top:20px; right:20px; z-index:25; padding:10px;" onclick="window.location.href='giminios.html'">✕ Close</button>

    <div id="playlist-drawer">
        <h2 style="color:#3d85c6;">Live TV</h2>
        <div id="channel-container"></div>
    </div>

    <video id="gemini-live-player" class="video-js vjs-big-play-centered" controls autoplay></video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        // কনফিগারেশন চেক করা
        if (typeof CONFIG === 'undefined') {
            document.body.innerHTML = "<h1 style='text-align:center; margin-top:20%;'>Error: config.js not found!</h1>";
        } else {
            const player = videojs('gemini-live-player');
            const supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
            const params = new URLSearchParams(window.location.search);
            const sourceUrl = params.get('url');

            async function init() {
                if (!sourceUrl) {
                    document.getElementById('status').innerText = "No URL provided!";
                    return;
                }
                
                try {
                    // CORS প্রক্সি ব্যবহার করে M3U ফেচ করা
                    const response = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(sourceUrl));
                    if (!response.ok) throw new Error("Could not connect to stream source.");
                    
                    const text = await response.text();
                    const container = document.getElementById('channel-container');
                    const lines = text.split('\n');

                    lines.forEach((line, index) => {
                        if (line.startsWith('#EXTINF:')) {
                            let name = line.split(',')[1] || "Unnamed Channel";
                            let nextLine = lines[index + 1];
                            if (nextLine && nextLine.startsWith('http')) {
                                let btn = document.createElement('div');
                                btn.className = 'ch-item';
                                btn.innerText = name;
                                btn.onclick = () => { 
                                    player.src({src: nextLine.trim(), type: 'application/x-mpegURL'}); 
                                    player.play(); 
                                    document.getElementById('playlist-drawer').classList.remove('open');
                                };
                                container.appendChild(btn);
                            }
                        }
                    });
                    document.getElementById('loader').style.display = 'none';
                } catch (e) {
                    document.getElementById('status').innerText = "Sync Failed: " + e.message;
                }
            }
            init();
        }
    </script>
</body>
</html>
